# Alembic configuration for IGEM-Server.
#
# This file is consumed by:
#   - the `alembic` CLI (e.g. `cd backend && alembic upgrade head`)
#   - our wrapper `igem_backend.modules.db.migrate.run_migration()`
#     (which uses the package-qualified script location via importlib)
#
# The `sqlalchemy.url` here is a placeholder; the real URI is injected
# by env.py from the IGEM_DB_URI env var (or by run_migration's Config).

[alembic]
script_location = src/igem_backend/alembic
prepend_sys_path = src
path_separator = os

# Placeholder — overridden at runtime by env.py via IGEM_DB_URI or
# by the wrapper.
sqlalchemy.url = postgresql+psycopg2://dev:dev@localhost/igem


# ----------------------------------------------------------------------
# Logging
# ----------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
